<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Availability - Iristel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/serviceAvailability.css" />

  <!-- ✅ Load Google Maps JS (use your key) -->
  <script>
    (g => {
      const h = "script";
      const a = "google";
      const b = "maps";
      const c = "importLibrary";
      const d = "__ib__";
      const e = document;
      const f = window;
      const k = "https://maps.googleapis.com/maps/api/js?key=" + encodeURIComponent("AIzaSyCPilDrU4uiB2aRpwDPAAqtVj9KXB3xpqc") + "&v=weekly";
      const l = new URL(k);
      const m = new Set();
      const n = new Promise((resolve, reject) => {
        f[a] = f[a] || {};
        f[a][b] = f[a][b] || {};
        const p = f[a][b];
        if (p[c]) return resolve();
        p[c] = (lib) => {
          m.add(lib);
          return new Promise((res, rej) => {
            const q = () => res(p[c](lib));
            if (p[d]) return q();
            const s = e.createElement(h);
            l.searchParams.set("libraries", Array.from(m).join(","));
            l.searchParams.set("callback", a + "." + b + "." + d);
            s.src = l.toString();
            s.async = true;
            s.onerror = () => rej(new Error("Google Maps JS failed to load."));
            e.head.appendChild(s);
            p[d] = () => q();
          });
        };
        resolve();
      });
      f.__gmapsReady = () => n;
    })();
  </script>
</head>

<body>
  <div class="container">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="logo">
        <img src="Images/Iristel-logo.png" alt="Iristel" class="logo-img" />
      </div>

      <div class="content">
        <div class="address-section">
          <svg class="location-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          <h1 class="address-title">Please enter your current address</h1>
        </div>

        <div class="address-form">
          <input
            type="text"
            class="address-input"
            placeholder="Enter address"
            autocomplete="off"
          />

          <!-- ✅ Status UI (no more fake suggestions) -->
          <div class="address-status" style="margin-top:10px; font-size:14px; display:none;"></div>

          <!-- ✅ Optional: show corrected / formatted address to confirm -->
          <div class="address-suggestion" style="margin-top:10px; display:none;">
            <div style="font-size:12px; opacity:.8; margin-bottom:6px;">Suggested (standardized) address:</div>
            <div class="suggested-text" style="padding:10px; border:1px solid #e5e7eb; border-radius:8px;"></div>
            <div style="margin-top:10px; display:flex; gap:10px;">
              <button type="button" class="btn-accept" style="padding:10px 12px; border-radius:10px; border:0; cursor:pointer;">Use suggested</button>
              <button type="button" class="btn-keep" style="padding:10px 12px; border-radius:10px; border:1px solid #e5e7eb; background:#fff; cursor:pointer;">Keep mine</button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="gradient-circle magenta"></div>
      <div class="gradient-circle cyan"></div>

      <div class="promo-content">
        <div class="laptop-image">
          <div class="laptop-frame">
            <div class="laptop-screen">
              <div class="video-call-grid">
                <div class="video-participant"><div class="participant-avatar"></div></div>
                <div class="video-participant"><div class="participant-avatar"></div></div>
                <div class="video-participant"><div class="participant-avatar"></div></div>
              </div>
            </div>
            <div class="laptop-base"></div>
          </div>
        </div>

        <div class="promo-text">
          <div class="discount-value">40<span>%</span></div>
          <div class="discount-label">OFF Smart Connect</div>
          <div class="discount-sublabel">Bundles</div>
          <p class="promo-description">Get the right business communication plan and save up to $474.</p>

          <div class="promo-buttons">
            <button class="btn-explore">EXPLORE BUNDLES NOW</button>
            <a href="#" class="learn-more">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
              LEARN MORE
            </a>
          </div>
        </div>
      </div>

      <!-- ✅ We validate before going next -->
      <button class="nav-button">Next: Create account</button>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/serviceAvailability.js"></script>
</body>
</html>
